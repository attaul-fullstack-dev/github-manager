        <div class="meta">
          <span class="text-mono">${escapeHtml(firstFile)}</span>
          ${fileNames.length > 1 ? `<span>+${fileNames.length - 1} more</span>` : ''}
          <span>Updated ${relativeTime(g.updated_at)}</span>
        </div>
      </div>`;
  }).join('');
  $$('#gists-list .repo-item').forEach(el => {
    const id = el.dataset.id;
    $$('button[data-act]', el).forEach(btn => {
      btn.onclick = async (e) => {
        e.stopPropagation();
        const act = btn.dataset.act;
        const g = gistsState.items.find(x => x.id === id); if (!g) return;
        if (act === 'copy') { copyToClipboard(g.html_url); }
        else if (act === 'edit') { gistFormModal(g); }
        else if (act === 'delete') {
          const ok = await showModal({ title: 'Delete gist', body: `Delete this gist? (${g.description || g.id})`, confirmText: 'Delete', danger: true });
          if (!ok) return;
          try {
            await ghFetch(`/gists/${id}`, { method: 'DELETE' });
            gistsState.items = gistsState.items.filter(x => x.id !== id);
            renderGistList(); showToast('Gist deleted', 'success');
          } catch (err) { showToast(err.message, 'error'); }
        }
      };
    });
  });
}

async function gistFormModal(existing) {
  const firstFile = existing ? Object.keys(existing.files)[0] : '';
  const firstContent = existing && existing.files[firstFile] ? (existing.files[firstFile].content || '') : '';
  await showFormModal({
    title: existing ? 'Edit gist' : 'New gist',
    confirmText: existing ? 'Save' : 'Create',
    html: `
      <div class="form-row"><label>Description</label>
        <input name="description" value="${escapeAttr(existing ? existing.description || '' : '')}" placeholder="Short description" /></div>
      <div class="form-row"><label>Filename</label>
        <input name="filename" required value="${escapeAttr(firstFile || 'snippet.txt')}" /></div>
      <div class="form-row"><label>Content</label>
        <textarea name="content" rows="10" class="mono" required>${escapeHtml(firstContent)}</textarea></div>
      ${existing ? '' : `<div class="form-row row"><label style="margin:0;display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;font-size:13px">
        <input type="checkbox" name="public" style="width:auto"> Public gist</label></div>`}
    `,
    onSubmit: async (data) => {
      if (existing) {
        const files = {};
        if (data.filename !== firstFile) {
          files[firstFile] = { filename: data.filename, content: data.content };
        } else {
          files[data.filename] = { content: data.content };
        }
        await ghFetch(`/gists/${existing.id}`, { method: 'PATCH', body: { description: data.description, files } });
        showToast('Gist updated', 'success');
      } else {
        const files = {}; files[data.filename] = { content: data.content };
        await ghFetch('/gists', { method: 'POST', body: { description: data.description, public: !!data.public, files } });
        showToast('Gist created', 'success');
      }
      await loadGists();
    },
  });
}

/* ---------- 14. Module 8: Settings ---------- */
function renderSettings(root) {
  const pat = ls.get(LS.pat);
  const cachedUser = ls.getJSON(LS.user);
  root.innerHTML = `
    <div class="page-head">
      <div><h1>Settings</h1><div class="sub">Manage your GitHub PAT and connection</div></div>
    </div>
    <div class="card">
      <h3 style="margin:0 0 10px;font-size:15px">Connection</h3>
      <div class="conn-status ${pat && cachedUser ? 'connected' : ''}" id="conn-status">
        <div class="dot"></div>
        <div style="flex:1">
          ${pat && cachedUser
            ? `<div><strong>Connected</strong> as ${escapeHtml(cachedUser.login)}</div><div class="text-muted" style="font-size:12px">${escapeHtml(cachedUser.name || '')}</div>`
            : `<div><strong>Not connected</strong></div><div class="text-muted" style="font-size:12px">Add a PAT below to get started.</div>`}
        </div>
        ${pat ? `<button class="btn-ghost" id="btn-disconnect" style="color:var(--danger)">Disconnect</button>` : ''}
      </div>

      <div style="margin-top:18px">
        <label>Personal Access Token (PAT)</label>
        <div class="input-group">
          <input type="password" id="pat-input" placeholder="ghp_…" autocomplete="off" value="${escapeAttr(pat || '')}" />
          <button class="btn-sm" id="pat-toggle" type="button">👁</button>
        </div>
        <div class="text-muted" style="font-size:12px;margin-top:6px">
          Need a token? <a href="https://github.com/settings/tokens?type=beta" target="_blank" rel="noopener">Generate one on GitHub</a>.
          Required scopes: <code>repo</code>, <code>gist</code>, <code>notifications</code>, <code>read:user</code>.
        </div>
        <div class="row gap-sm" style="margin-top:12px">
          <button class="btn-primary" id="pat-save">Save & verify</button>
          <button class="btn-ghost" id="pat-clear">Clear input</button>
        </div>
        <div id="pat-result" class="mt-3"></div>
      </div>
    </div>

    <div class="card mt-3">
      <h3 style="margin:0 0 10px;font-size:15px">Rate limit</h3>
      <div id="rate-info" class="text-muted">${state.rateRemaining != null
        ? `Remaining: <strong>${state.rateRemaining}</strong> / ${state.rateLimit} · Resets ${state.rateReset ? relativeTime(new Date(state.rateReset).toISOString()) : '—'}`
        : 'Make a request to see rate limit info.'}</div>
      <button class="btn-sm mt-2" id="rate-refresh">Refresh</button>
    </div>

    <div class="card mt-3">
      <h3 style="margin:0 0 10px;font-size:15px">About</h3>
      <div class="text-muted" style="font-size:13px">
        Single-file GitHub manager. All data stays in your browser (<code>localStorage</code>).
        No analytics, no server. PAT is sent only to <code>api.github.com</code>.
      </div>
    </div>
  `;

  $('#pat-toggle').onclick = () => {
    const inp = $('#pat-input');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  };
  $('#pat-clear').onclick = () => { $('#pat-input').value = ''; };
  $('#pat-save').onclick = async () => {
    const v = $('#pat-input').value.trim();
    if (!v) { showToast('Enter a PAT first', 'error'); return; }
    ls.set(LS.pat, v);
    $('#pat-result').innerHTML = '<div class="text-muted">Verifying…</div>';
    try {
      const u = await ghFetch('/user');
      ls.set(LS.user, u);
      state.user = u;
      $('#pat-result').innerHTML = `
        <div class="row" style="margin-top:6px">
          <img src="${escapeAttr(u.avatar_url)}" style="width:36px;height:36px;border-radius:50%" alt="" />
          <div><strong>${escapeHtml(u.name || u.login)}</strong> (@${escapeHtml(u.login)})</div>
        </div>`;
      showToast('Token verified — welcome ' + (u.name || u.login), 'success');
      ghFetch('/notifications?all=false').then(arr => updateNotifBadge(Array.isArray(arr) ? arr.length : 0)).catch(() => {});
      renderSettings(root);
    } catch (e) {
      ls.del(LS.pat); ls.del(LS.user);
      $('#pat-result').innerHTML = `<div class="text-muted" style="color:var(--danger)">${escapeHtml(e.message)}</div>`;
    }
  };
  if (pat) {
    $('#btn-disconnect').onclick = async () => {
      const ok = await showModal({
        title: 'Disconnect',
        body: 'This removes your PAT and clears cached user/repo state from this browser. The token is not revoked on GitHub.',
        confirmText: 'Disconnect', danger: true,
      });
      if (!ok) return;
      Object.values(LS).forEach(k => ls.del(k));
      state.user = null; reposCache.items = null; updateNotifBadge(0);
      showToast('Disconnected', 'success');
      setRoute('settings');
    };
  }
  $('#rate-refresh').onclick = async () => {
    try {
      const r = await ghFetch('/rate_limit');
      const core = r && r.resources && r.resources.core;
      if (core) {
        state.rateRemaining = core.remaining; state.rateLimit = core.limit; state.rateReset = core.reset * 1000;
        $('#rate-info').innerHTML = `Remaining: <strong>${core.remaining}</strong> / ${core.limit} · Resets ${relativeTime(new Date(core.reset * 1000).toISOString())}`;
      }
    } catch (e) { showToast(e.message, 'error'); }
  };
}

/* ---------- 15. Init ---------- */
function init() {
  bindNav();
  const lastPage = ls.get(LS.page);
  if (!location.hash) {
    location.hash = '#' + (lastPage && ROUTES.includes(lastPage) ? lastPage : 'dashboard');
  }
  state.user = ls.getJSON(LS.user);
  renderRoute();

  if (ls.get(LS.pat)) {
    ghFetch('/notifications?all=false').then(arr => updateNotifBadge(Array.isArray(arr) ? arr.length : 0)).catch(() => {});
  }

  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'f') {
      const bar = $('#find-bar');
      if (bar && currentRoute === 'explorer' && exState.file && !exState.editing) {
        e.preventDefault();
        if (bar.classList.contains('hidden')) toggleFindBar();
        else $('#find-input').focus();
      }
    }
    if (e.key === 'Escape') {
      const c = $('#modal-container');
      if (c.classList.contains('active')) {
        c.classList.remove('active'); c.innerHTML = '';
      }
    }
  });
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();
</script>
</body>
